# Local dev: just Postgres. The app runs natively with `bun run dev`.
# Production: set ATLAS_DATASOURCE_URL to your analytics datasource — no Docker needed.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/demo.sql:/docker-entrypoint-initdb.d/demo.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Sandbox sidecar — isolated explore tool for production (Railway, Render, Docker).
  # Uncomment to test sidecar locally. Set ATLAS_SANDBOX_URL=http://localhost:8080 in .env.
  # sidecar:
  #   build:
  #     context: .
  #     dockerfile: sidecar/Dockerfile
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - SIDECAR_AUTH_TOKEN=${SIDECAR_AUTH_TOKEN:-dev-token}

volumes:
  pgdata:
